services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-studyspace}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in your environment or .env}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-studyspace}
      MONGODB_APP_NAME: ${MONGODB_APP_NAME:-studyspace-api}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-5000}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/app/chroma_db
      - user_data:/app/app/users

  app-gpu:
    profiles: ["gpu"]
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in your environment or .env}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-studyspace}
      MONGODB_APP_NAME: ${MONGODB_APP_NAME:-studyspace-api}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-5000}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/app/chroma_db
      - user_data:/app/app/users
    gpus: all

volumes:
  mongo_data:
  chroma_data:
  user_data:
