<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% if frontend_built %}
    <link rel="stylesheet" href="/static/dist/assets/index.css?v={{ frontend_asset_version }}">
    {% endif %}
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f6f3ec;
            color: #182126;
            font-family: "Space Grotesk", sans-serif;
        }

        .build-warning {
            max-width: 720px;
            margin: 48px auto 0;
            padding: 20px 24px;
            border-radius: 18px;
            border: 1px solid rgba(24, 33, 38, 0.12);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 40px rgba(24, 33, 38, 0.08);
        }

        .build-warning h1 {
            margin: 0 0 8px;
            font-size: 1.1rem;
        }

        .build-warning p {
            margin: 0;
            color: #5e6a70;
            line-height: 1.5;
        }

        .build-warning code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
    </style>
</head>
<body>
    {% if not frontend_built %}
    <div class="build-warning">
        <h1>Frontend build not found</h1>
        <p>Run <code>npm install</code> and <code>npm run build</code> inside <code>frontend/</code>, then reload this page.</p>
    </div>
    {% endif %}
    <div id="root"></div>
    {% if frontend_built %}
    <script type="module" src="/static/dist/assets/index.js?v={{ frontend_asset_version }}"></script>
    {% endif %}
</body>
</html>
